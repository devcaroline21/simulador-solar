<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Energia Solar</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align: center;
            color: #2e7d32;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button{
            width: 100%;
            padding: 12px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover{
            background: #1b5e20;
        }

        .resultado{
            margin-top: 20px;
            background: #e8f5e9;
            padding: 15px;
            border-radius: 10px;
        }

    </style>
</head>
<body>

<div class="container">

    <h1>Simulador Solar</h1>

    <form method="POST">

        <label>Conta de luz mensal (R$)</label>
        <input type="number" step="0.01" name="conta" required>

        <label>Consumo mensal (kWh)</label>
        <input type="number" step="0.01" name="consumo" required>

        <label>Custo do sistema solar (R$)</label>
        <input type="number" step="0.01" name="custo" required>

        <button type="submit">Calcular</button>

    </form>

    {% if resultado %}

    <div class="resultado">

        <h3>Resultado</h3>

        <p>
            <strong>Economia mensal:</strong>
            R$ {{ resultado.economia_mensal }}
        </p>

        <p>
            <strong>Economia anual:</strong>
            R$ {{ resultado.economia_anual }}
        </p>

        <p>
            <strong>Tempo de retorno:</strong>
            {{ resultado.retorno_anos }} anos
        </p>

    </div>

    {% endif %}

</div>

</body>
</html>
